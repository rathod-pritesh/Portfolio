<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		%sveltekit.head%

		<script src="/libs/webcomponents-loader.js"></script>
		<script src="/libs/polyfill-support.js"></script>

		<script>
			const originalFetch = window.fetch;

			window.fetch = async (...args) => {
				if (args[0]?.includes("n8n-preview-service")) {
					return new Response(null, { status: 200 });
				}
				return originalFetch(...args);
			};
		</script>

		<script type="module" src="/libs/n8n-demo.bundled.js"></script>
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
